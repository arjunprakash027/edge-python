[workspace]
members = ["compiler", "edge-pdk", "edge-pdk/macros", "examples/slugify-mod"]
# Wasm-only example crates live in `members` (so they share the lockfile and
# resolve path deps) but are excluded from default workspace commands. Run
# them explicitly with `-p` against `wasm32-unknown-unknown`.
default-members = ["compiler", "edge-pdk", "edge-pdk/macros"]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/dylan-sutton-chavez/edge-python/"

# Single source of truth for third-party versions. Members opt in with
# `dep = { workspace = true }` so a bump touches one line workspace-wide
# and the lockfile cannot grow accidental version splits.
[workspace.dependencies]
hashbrown = { version = "0.17", default-features = false }
itoa = "1"
lol_alloc = "0.4"
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
