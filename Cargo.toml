[workspace]
members = ["compiler", "edge-pdk", "edge-pdk/macros", "examples/slugify-mod"]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/dylan-sutton-chavez/edge-python/"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
