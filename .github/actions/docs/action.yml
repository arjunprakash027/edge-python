name: Docs build & deploy
description: Build the Nextra static export (docs/out); deploy to edge-python-docs when deploy=true.

inputs:
  deploy:
    description: true to deploy after a successful build.
    required: false
    default: "false"
  cloudflare-api-token:
    description: Cloudflare API token (deploy only).
    required: false
    default: ""
  cloudflare-account-id:
    description: Cloudflare account id (deploy only).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: docs/package-lock.json

    # Reproducible install from the committed lockfile.
    - name: Install
      shell: bash
      working-directory: docs
      run: npm ci

    - name: Build
      shell: bash
      working-directory: docs
      run: npm run build

    - name: Deploy to Cloudflare Pages
      if: inputs.deploy == 'true'
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ inputs.cloudflare-api-token }}
        accountId: ${{ inputs.cloudflare-account-id }}
        command: pages deploy docs/out --project-name=edge-python-docs --branch=main
