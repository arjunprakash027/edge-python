name: CDN deploy
description: Stage every package output under one tree and deploy it to edge-python-cdn.

inputs:
  cloudflare-api-token:
    description: Cloudflare API token.
    required: true
  cloudflare-account-id:
    description: Cloudflare account id.
    required: true

runs:
  using: composite
  steps:
    - name: Download compiler wasm
      uses: actions/download-artifact@v8
      with:
        name: compiler_wasm
        path: /tmp/compiler/

    - name: Download std artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: dist-*
        path: /tmp/std/
        merge-multiple: true

    - name: Download cli artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: edge-*
        path: /tmp/cli/
        merge-multiple: true

    - name: Install brotli
      shell: bash
      run: command -v brotli >/dev/null || (sudo apt-get update && sudo apt-get install -y brotli)

    - name: Stage site
      shell: bash
      run: |
        mkdir -p _site/runtime _site/std _site/host _site/cli

        # compiler: served at /compiler.wasm as brotli-11; _headers tags the encoding.
        brotli -q 11 -c /tmp/compiler/compiler.wasm > _site/compiler.wasm
        printf '/compiler.wasm\n  Content-Type: application/wasm\n  Content-Encoding: br\n  Cache-Control: public, max-age=0, must-revalidate\n' > _site/_headers

        # runtime: JS sources; the wasm is loaded from the CDN root, not bundled here.
        cp -r runtime/. _site/runtime/

        # std: <pkg>.wasm / <pkg>.py.
        cp -r /tmp/std/. _site/std/

        # host: flatten each capability's src/ into _site/host/<cap>/.
        for dir in host/*/src; do
          cap="$(basename "$(dirname "$dir")")"
          mkdir -p "_site/host/$cap"
          cp -r "$dir"/. "_site/host/$cap/"
        done

        # cli: release tarballs + the install/uninstall scripts, served under cdn.edgepython.com/cli/.
        cp -r /tmp/cli/. _site/cli/
        cp cli/setup/install.sh cli/setup/uninstall.sh _site/cli/

    - name: Report served size
      shell: bash
      run: |
        echo "compiler.wasm served as brotli-11: $(( $(stat -c%s _site/compiler.wasm) / 1024 )) KB" >> "$GITHUB_STEP_SUMMARY"

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ inputs.cloudflare-api-token }}
        accountId: ${{ inputs.cloudflare-account-id }}
        command: pages deploy _site --project-name=edge-python-cdn --branch=main
