name: CDN deploy
description: Stage every package output under one tree and deploy it to edge-python-cdn.

inputs:
  cloudflare-api-token:
    description: Cloudflare API token.
    required: true
  cloudflare-account-id:
    description: Cloudflare account id.
    required: true

runs:
  using: composite
  steps:
    - name: Download compiler wasm
      uses: actions/download-artifact@v8
      with:
        name: compiler_wasm
        path: /tmp/compiler/

    # TEMPORARY (compiler-rename deploy): the std/cli build jobs are not gating this
    # job, so their dist-*/edge-* artifacts aren't available. A Pages deploy replaces
    # the whole site, so we must still ship std/ and cli/ or they'd be wiped. They're
    # byte-identical to what's live (the rename only touches compiler.wasm), so we
    # rehydrate them straight from the production CDN. --fail aborts on any missing
    # file rather than deploying a broken tree. Revert to the dist-*/edge-* downloads
    # once the full pipeline gates this job again.
    - name: Rehydrate std + cli from live CDN
      shell: bash
      env:
        CDN: https://cdn.edgepython.com
      run: |
        set -euo pipefail
        mkdir -p /tmp/std /tmp/cli
        for f in json.wasm re.wasm math.wasm test.py; do
          curl -fsSL "$CDN/std/$f" -o "/tmp/std/$f"
        done
        for t in x86_64-unknown-linux-musl aarch64-unknown-linux-musl x86_64-apple-darwin aarch64-apple-darwin; do
          curl -fsSL "$CDN/cli/edge-$t.tar.gz" -o "/tmp/cli/edge-$t.tar.gz"
        done
        echo "Rehydrated std:" && ls -l /tmp/std
        echo "Rehydrated cli:" && ls -l /tmp/cli

    - name: Stage site
      shell: bash
      run: |
        mkdir -p _site/runtime _site/std _site/host _site/cli

        # compiler: the wasm module, served at the CDN root (cdn.edgepython.com/compiler.wasm).
        cp /tmp/compiler/compiler.wasm _site/compiler.wasm

        # runtime: JS sources; the wasm is loaded from the CDN root, not bundled here.
        cp -r runtime/. _site/runtime/

        # std: <pkg>.wasm / <pkg>.py.
        cp -r /tmp/std/. _site/std/

        # host: flatten each capability's src/ into _site/host/<cap>/.
        for dir in host/*/src; do
          cap="$(basename "$(dirname "$dir")")"
          mkdir -p "_site/host/$cap"
          cp -r "$dir"/. "_site/host/$cap/"
        done

        # cli: release tarballs.
        cp -r /tmp/cli/. _site/cli/

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ inputs.cloudflare-api-token }}
        accountId: ${{ inputs.cloudflare-account-id }}
        command: pages deploy _site --project-name=edge-python-cdn --branch=main
