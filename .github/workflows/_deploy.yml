name: _Deploy Host Capabilities

on:
  workflow_call:
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

jobs:
  deploy:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Unlike std (bare .wasm artifacts), the host serves its ESM sources, so checkout the tree.
      - uses: actions/checkout@v6

      # Mirror each capability's src/ into _site/<cap>/src so imports keep their ./<cap>/src/index.js shape.
      - name: Assemble site
        run: |
          mkdir -p _site
          for dir in */src; do
            cap="${dir%/src}"
            mkdir -p "_site/$cap"
            cp -r "$dir" "_site/$cap/src"
          done

      # Pages serves the modules at host.edgepython.com/<cap>/src/*.
      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin to the Pages production branch.
          command: pages deploy _site --project-name=edge-python-host --branch=main
