name: _Deploy Standard Packages

on:
  workflow_call:
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

jobs:
  deploy:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Pull every per-package wasm uploaded by _wasm.yml.
      - name: Download wasm artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wasm-*
          path: _site/js/
          merge-multiple: true

      # Pages serves the wasm at runtime.edgepython.com/js/*.
      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin to the Pages production branch.
          command: pages deploy _site --project-name=edge-python-std --branch=main
