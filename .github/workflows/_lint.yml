name: _Lint

on:
  workflow_call:
    inputs:
      package:
        description: Stdpkg directory to clippy (e.g. json).
        required: true
        type: string

jobs:
  lint:
    name: Cargo Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      # Cargo registry and target, keyed per package; stable prefix avoids the nightly job's cache.
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ inputs.package }}/target
          key: cargo-stable-${{ runner.os }}-${{ inputs.package }}-${{ hashFiles(format('{0}/Cargo.toml', inputs.package)) }}
          restore-keys: cargo-stable-${{ runner.os }}-${{ inputs.package }}-

      # Lint only the cdylib; --all-targets clashes with its panic handler.
      - name: Clippy src/
        working-directory: ${{ inputs.package }}
        run: cargo clippy --release --target wasm32-unknown-unknown -- -D warnings
