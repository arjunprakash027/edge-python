name: _Test

on:
  workflow_call:
    inputs:
      package:
        description: Stdpkg directory whose corpus to drive through the sandbox (e.g. json).
        required: true
        type: string

jobs:
  test:
    name: Sandbox Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Caches `~/.cargo/registry` (git deps + index) and the package's `target/`. Key invalidates when Cargo.toml changes.
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ inputs.package }}/target
          key: cargo-${{ runner.os }}-${{ inputs.package }}-${{ hashFiles(format('{0}/Cargo.toml', inputs.package)) }}
          restore-keys: cargo-${{ runner.os }}-${{ inputs.package }}-

      # Caches npm: and jsr: imports (e.g. npm:playwright). Key invalidates when deno.json / deno.lock change.
      - name: Cache Deno modules
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: deno-${{ runner.os }}-

      # ~150MB Chromium binary; cached across runs so only the first run pays the download.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      # --with-deps installs OS-level libs (libnss, libatk, ...) required by Chromium on Linux runners. Idempotent: cache-hit makes it a no-op.
      - name: Install Chromium
        run: deno run -A npm:playwright install --with-deps chromium

      - name: Build wasm
        working-directory: ${{ inputs.package }}
        run: cargo build --release --target wasm32-unknown-unknown

      # `STDPKG` narrows sandbox discovery so this shard only drives its own corpus through Chromium.
      - name: Test sandbox/
        env:
          STDPKG: ${{ inputs.package }}
        run: deno test --allow-all sandbox/
