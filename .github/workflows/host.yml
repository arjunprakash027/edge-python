name: Host

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Deno lint per capability. Anchors the matrix so downstream jobs reuse it.
  lint:
    name: Lint (${{ matrix.capability }})
    runs-on: ubuntu-latest
    strategy: &capability-matrix
      fail-fast: false
      matrix:
        capability: [dom, network, storage, time]
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Stays consistent with the test job's cache; protects host packages that lint remote-imported modules.
      - name: Cache Deno modules
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('host/**/deno.json', 'host/**/deno.lock') }}
          restore-keys: deno-${{ runner.os }}-

      - name: Lint src/
        working-directory: host/${{ matrix.capability }}
        run: deno lint src/

  # Smoke test each capability against the real demo in headless Chromium. Gated on lint to avoid wasting Chromium time.
  test:
    name: Test (${{ matrix.capability }})
    needs: lint
    runs-on: ubuntu-latest
    strategy: *capability-matrix
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno modules
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('host/**/deno.json', 'host/**/deno.lock') }}
          restore-keys: deno-${{ runner.os }}-

      # ~150MB Chromium; cached across runs so only the first run pays the download.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      # --with-deps installs OS-level libs Chromium needs. Idempotent: cache-hit makes it a no-op.
      - name: Install Chromium
        run: deno run -A npm:playwright install --with-deps chromium

      # `HOSTCAP` narrows test discovery to this capability's corpus.
      - name: Test tests/
        working-directory: host
        env:
          HOSTCAP: ${{ matrix.capability }}
        run: deno test --allow-all tests/

  # Publish every capability's ESM to Cloudflare Pages on pushes to main only.
  deploy:
    name: Deploy
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Host serves its ESM sources, so checkout the tree.
      - uses: actions/checkout@v6

      # Flatten each capability's src/ into _site/<cap> so the public path is <cap>/index.js; siblings move together, so relative imports stay valid.
      - name: Assemble site
        run: |
          mkdir -p _site
          for dir in host/*/src; do
            cap="$(basename "$(dirname "$dir")")"
            mkdir -p "_site/$cap"
            cp -r "$dir"/. "_site/$cap/"
          done

      # Pages serves the modules at host.edgepython.com/<cap>/*.
      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=edge-python-host --branch=main
