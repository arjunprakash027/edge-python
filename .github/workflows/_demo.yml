name: _Demo Deploy

on:
  workflow_call:

jobs:
  deploy:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Download the .wasm for hashing only; the demo loads it from the CDN at runtime
      # (https://runtime.edgepython.com/js/compiler_lib.wasm), so it does not ship inside demo/.
      - name: Download wasm artifact
        uses: actions/download-artifact@v8
        with:
          name: compiler_lib_wasm
          path: /tmp/wasm/

      # Hash everything the demo's worker actually loads:
      #   - compiler_lib.wasm (served by edge-python-runtime)
      #   - runtime/ JS sources (served by edge-python-runtime)
      #   - demo/runtime/ Python entry files (served by edge-python-demo)
      - name: Write version manifest
        run: |
          HASH=$( { sha256sum /tmp/wasm/compiler_lib.wasm; \
                    find runtime -type f | LC_ALL=C sort | xargs sha256sum; \
                    find demo/runtime -type f | LC_ALL=C sort | xargs sha256sum; \
                  } | sha256sum | cut -c1-12)
          printf '{"v":"%s"}\n' "$HASH" > demo/version.json

      - name: Build Tailwind CSS
        working-directory: demo
        run: |
          echo "@tailwind base;@tailwind components;@tailwind utilities;" \
            | npx tailwindcss@3 --input - --output tailwind.css --minify

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin to the Pages production branch. See the matching comment in _runtime.yml.
          command: pages deploy demo --project-name=edge-python-demo --branch=main
