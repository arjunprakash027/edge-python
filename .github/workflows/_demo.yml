name: _Demo Deploy

on:
  workflow_call:

jobs:
  deploy:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Download the .wasm already compiled and optimized by _wasm.yml.
      - name: Download wasm artifact
        uses: actions/download-artifact@v8
        with:
          name: compiler_lib_wasm
          path: demo/

      - name: Write version manifest
        run: |
          HASH=$( { sha256sum demo/compiler_lib.wasm; \
                    find demo/runtime -type f | LC_ALL=C sort | xargs sha256sum; \
                  } | sha256sum | cut -c1-12)
          printf '{"v":"%s"}\n' "$HASH" > demo/version.json

      - name: Build Tailwind CSS
        working-directory: demo
        run: |
          echo "@tailwind base;@tailwind components;@tailwind utilities;" \
            | npx tailwindcss@3 --input - --output tailwind.css --minify

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy demo --project-name=edge-python-demo --branch=${{ github.ref_name }}
