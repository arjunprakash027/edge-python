name: CLI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # `cli/` is a separate workspace; key the cache off its Cargo.lock and target dir.
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli -> cli/target

      # Engine tests drive a real Chromium; ubuntu-latest ships google-chrome-stable preinstalled.
      - name: Build
        working-directory: cli
        run: cargo build

      - name: Test
        working-directory: cli
        run: cargo test

  # One native build per target; GitHub's free ARM/macOS runners avoid the cross-compile pain.
  build_release:
    name: Build release (${{ matrix.target }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build_test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli -> cli/target
          key: ${{ matrix.target }}

      - name: Build release
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Tar
        working-directory: cli
        run: tar -C target/${{ matrix.target }}/release -czf edge-${{ matrix.target }}.tar.gz edge

      - uses: actions/upload-artifact@v4
        with:
          name: edge-${{ matrix.target }}
          path: cli/edge-${{ matrix.target }}.tar.gz

  pages:
    name: Publish to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Collect tarballs and stage Pages site
        run: |
          mkdir -p _site
          cp cli/setup/*.sh _site/

      - uses: actions/download-artifact@v4
        with:
          path: _site
          pattern: edge-*
          merge-multiple: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
