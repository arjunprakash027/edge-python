name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # Lint and check the codebase, including running clippy and checking for unused code.
  check:
    name: Lint and Check
    uses: ./.github/workflows/_check.yml
    secrets: inherit

  # Build the release WebAssembly artifact.
  wasm:
    name: WebAssembly
    needs: check
    permissions:
      contents: write
    uses: ./.github/workflows/_wasm.yml
    secrets: inherit

  # Upload runtime (JS + WASM) to the CDN, that contains the web browser logic.
  runtime:
    name: Upload Runtime to CDN
    needs: wasm
    permissions:
      contents: read
    uses: ./.github/workflows/_runtime.yml
    secrets: inherit

  # Build the demo after the runtime upload, since the demo consumes the CDN-hosted runtime.
  demo:
    name: Build Demo
    needs: runtime
    permissions:
      contents: read
    uses: ./.github/workflows/_demo.yml
    secrets: inherit
