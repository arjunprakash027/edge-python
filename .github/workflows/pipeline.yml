name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # Lint each capability's JS source with deno lint. Anchors the matrix so downstream jobs can alias it.
  lint:
    name: Lint (${{ matrix.capability }})
    strategy: &capability-matrix
      fail-fast: false
      matrix:
        capability: [dom, network, storage]
    uses: ./.github/workflows/_lint.yml
    with:
      capability: ${{ matrix.capability }}
    secrets: inherit

  # Run each capability's smoke test against the real demo in headless Chromium. Gated on lint so a broken source never reaches the (slower) Chromium-backed test stage.
  test:
    name: Test (${{ matrix.capability }})
    needs: lint
    strategy: *capability-matrix
    uses: ./.github/workflows/_test.yml
    with:
      capability: ${{ matrix.capability }}
    secrets: inherit

  # Publish every capability's ESM to Cloudflare Pages on pushes to main only.
  deploy:
    name: Deploy
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
