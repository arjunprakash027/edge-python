name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Clippy each stdpkg and anchor the package matrix.
  lint:
    name: Lint (${{ matrix.package }})
    strategy: &package-matrix
      fail-fast: false
      matrix:
        package: [json, re, math]
    uses: ./.github/workflows/_lint.yml
    with:
      package: ${{ matrix.package }}
    secrets: inherit

  # Build, optimize and test each package's wasm, gated on lint.
  wasm:
    name: WASM (${{ matrix.package }})
    needs: lint
    strategy: *package-matrix
    uses: ./.github/workflows/_wasm.yml
    with:
      package: ${{ matrix.package }}
    secrets: inherit

  # Publish all wasm artifacts to Cloudflare Pages on pushes to main only.
  deploy:
    name: Deploy
    needs: wasm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
