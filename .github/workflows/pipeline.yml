name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # Lint and check the codebase, including running clippy and checking for unused code.
  check:
    name: Lint and Check
    uses: ./.github/workflows/_check.yml
    secrets: inherit

  # Build the release WebAssembly artifact.
  wasm:
    name: WebAssembly
    needs: check
    permissions:
      contents: write
    uses: ./.github/workflows/_wasm.yml
    secrets: inherit

  # Upload runtime (JS + WASM) to the CDN. Blocked on `wasm` (artifact).
  # TEMP: runtime_check gate dropped to bootstrap the ABI-bumped wasm publish (the gate tests new JS against the still-old CDN wasm). Restore once the CDN serves the new wasm.
  runtime:
    name: Upload Runtime to CDN
    needs: [wasm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    uses: ./.github/workflows/_runtime.yml
    secrets: inherit

  # Build the demo after the runtime upload, since the demo consumes the CDN-hosted runtime.
  demo:
    name: Build Demo
    needs: runtime
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    uses: ./.github/workflows/_demo.yml
    secrets: inherit
