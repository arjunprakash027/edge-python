name: _WASM

on:
  workflow_call:
    inputs:
      package:
        description: Stdpkg directory to build, optimize, and test (e.g. json).
        required: true
        type: string

env:
  BINARYEN_VERSION: "121"
  WASM: ${{ inputs.package }}/target/wasm32-unknown-unknown/release/${{ inputs.package }}.wasm

jobs:
  wasm:
    name: Build, Optimize & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # build-std needs nightly plus rust-src.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Cargo registry and target, keyed per package; nightly prefix avoids the lint job's cache.
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ inputs.package }}/target
          key: cargo-nightly-${{ runner.os }}-${{ inputs.package }}-${{ hashFiles(format('{0}/Cargo.toml', inputs.package)) }}
          restore-keys: cargo-nightly-${{ runner.os }}-${{ inputs.package }}-

      # Deno npm and jsr module cache.
      - name: Cache Deno modules
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: deno-${{ runner.os }}-

      # Cached across runs; only the first pays the Chromium download.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install Chromium
        run: deno run -A npm:playwright install --with-deps chromium

      # apt ships an old binaryen, so fetch the upstream release.
      - name: Install wasm-opt
        run: |
          curl -sSL "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" \
            | tar -xz --strip-components=2 -C /usr/local/bin "binaryen-version_${BINARYEN_VERSION}/bin/wasm-opt"
          wasm-opt --version

      - name: Build
        working-directory: ${{ inputs.package }}
        run: |
          RUSTFLAGS="-Z location-detail=none -Z fmt-debug=none -Z unstable-options -C panic=immediate-abort" \
          cargo +nightly build \
            --target wasm32-unknown-unknown \
            --lib --release \
            -Z build-std=std,panic_abort

      - name: Size (unoptimized)
        run: ls -lh "$WASM"

      # Two passes: -Oz with traps-never-happen, then reflatten for a fresh CFG.
      - name: Optimize
        run: |
          wasm-opt -Oz --converge \
            --generate-global-effects \
            --strip-debug --strip-producers \
            --enable-bulk-memory-opt \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            -tnh \
            -o /tmp/wasm_stage1.wasm "$WASM"

          wasm-opt --flatten --rereloop -Oz -Oz \
            --enable-bulk-memory-opt \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            -o "$WASM" /tmp/wasm_stage1.wasm

          rm /tmp/wasm_stage1.wasm

      - name: Size (optimized)
        run: ls -lh "$WASM"

      # STDPKG narrows Deno's test discovery to this package's corpus.
      - name: Test
        env:
          STDPKG: ${{ inputs.package }}
        run: deno test --allow-all tests/

      - uses: actions/upload-artifact@v6
        with:
          name: wasm-${{ inputs.package }}
          path: ${{ env.WASM }}
          retention-days: 1
