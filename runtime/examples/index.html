<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edge Python DOM</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; color: #222; }
        h1 { font-size: 1.4em; }
        #app { padding: 0.75em; background: #f4f4f4; border-radius: 6px; }
        .fresh { color: #d97757; font-weight: 600; }
        pre { background: #1c1c1c; color: #c2c2c2; padding: 0.75em; border-radius: 6px; font-size: 13px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Edge Python DOM</h1>
    <div id="app">untouched</div>
    <ul id="list"></ul>
    <pre id="output"></pre>

    <script type="module">
        // TEMP — local edge-python on 8090; revert to jsdelivr once published. Uses createInline because DOM bridges need main-thread document access.
        import { createInline } from "http://127.0.0.1:8090/runtime/src/index.js";

        const base = new URL('..', import.meta.url).href;

        const worker = await createInline({
            wasmUrl: base + 'compiler_lib.wasm',
            imports: { dom: base + 'edge_python_dom.wasm' },
            loaders: ['http://127.0.0.1:8090/runtime/loaders/capability-bridge.js'],
        });

        worker.onOutput((line) => { document.getElementById("output").textContent += line + "\n"; });
        try {
            const { out, ms } = await worker.run(await (await fetch("./hello.py")).text());
            if (out) document.getElementById("output").textContent += "\n[diagnostic]\n" + out;
            console.log("ran in", ms, "ms; diagnostic:", out || "(empty)");
        } catch (e) {
            document.getElementById("output").textContent += "\n[error]\n" + (e?.message ?? e);
            console.error(e);
        }
    </script>
</body>
</html>
