<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script type="module" src="https://runtime.edgepython.com/js/src/element.js"></script>
</head>
<body>
  <edge-python id="ep" packages="packages.json"></edge-python>
  <script type="module">
    // Progress the CLI polls over CDP: lines stream in, then done flips with ok/err.
    const st = { lines: [], done: false, ok: false, err: "" };
    window.__edge = st;
    const el = document.getElementById("ep");
    (async () => {
      try {
        // Drive the worker ourselves (no `entry`) so we attach onOutput before the run.
        while (!el.worker) await new Promise((r) => setTimeout(r, 10));
        el.onOutput((line) => st.lines.push(line));
        // run() resolves on both DONE and ERROR; non-empty `out` is the traceback.
        const res = await el.run(__EDGE_SRC__, { baseUrl: location.href });
        if (res && res.out) st.err = res.out;
        else st.ok = true;
      } catch (e) {
        st.err = (e && e.message) ? e.message : String(e);
      } finally {
        st.done = true;
      }
    })();
  </script>
</body>
</html>
