<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script type="module" src="https://cdn.edgepython.com/runtime/src/element.js"></script>
</head>
<body>
  <edge-python id="ep" packages="packages.json"></edge-python>
  <script type="module">
    // Progress the CLI polls over CDP: lines stream in, then done flips with ok/err.
    const st = { lines: [], done: false, ok: false, err: "", code: null };
    window.__edge = st;
    const el = document.getElementById("ep");
    (async () => {
      // Drive the worker ourselves (no `entry`) so we attach onOutput once and reuse across evals.
      while (!el.worker) await new Promise((r) => setTimeout(r, 10));
      el.onOutput((line) => st.lines.push(line));
      // CLI calls this per input with replayed history; runtime recompiles each time.
      window.__edgeRun = async (src) => {
        st.lines = []; st.done = false; st.ok = false; st.err = ""; st.code = null;
        try {
          const res = await el.run(src, { baseUrl: location.href, incremental: true });
          // SystemExit: clean termination carrying an exit code, not an error.
          if (res && typeof res.exitCode === "number") { st.code = res.exitCode; st.ok = true; }
          else if (res && res.out) st.err = res.out;
          else st.ok = true;
        } catch (e) {
          st.err = (e && e.message) ? e.message : String(e);
        } finally {
          st.done = true;
        }
      };
      // `.reset` calls this to wipe runtime modules without re-launching the browser.
      window.__edgeReset = () => el.worker.reset();
      window.__edgeReady = true;
    })();
  </script>
</body>
</html>
