<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>edge app</title>
</head>
<body>
  <script type="module">
    // Self-contained launcher; bypasses <edge-python> since its wasmUrl is hardcoded to the CDN.
    import { createWorker } from "./runtime/src/index.js";
    const pkgs = await fetch("./packages.json").then((r) => r.json());
    const src = await fetch("./__EDGE_ENTRY__").then((r) => r.text());
    const worker = await createWorker({
      wasmUrl: "./compiler.wasm",
      imports: pkgs.imports || {},
      hostModules: pkgs.host || {},
      defaults: false,
    });
    // Byte-stream stdout: buffer raw chunks and console.log only whole lines (console.log adds its own newline).
    let buf = "";
    worker.onOutput((chunk) => {
      buf += chunk;
      let nl;
      while ((nl = buf.indexOf("\n")) >= 0) { console.log(buf.slice(0, nl)); buf = buf.slice(nl + 1); }
    });
    await worker.run(src, { baseUrl: location.href });
    if (buf) console.log(buf); // flush a trailing line printed without a newline (e.g. print(end=""))
  </script>
</body>
</html>
