<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edge Python DOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans text-gray-800 max-w-3xl mx-auto my-12 px-6">
    <h1 class="text-2xl mb-1">Edge Python DOM</h1>
    <p class="text-gray-500 text-[0.95em] mb-8">A color palette, rendered from Python in your browser.</p>

    <div id="palette" class="grid grid-cols-[repeat(auto-fit,minmax(140px,1fr))] gap-3"></div>

    <pre id="output" class="bg-neutral-900 text-neutral-300 p-3 rounded-md text-xs mt-8 overflow-x-auto"></pre>

    <script type="module">
        // Import engine.js directly instead of createWorker: the DOM bridge calls document.* which isn't available in a Web Worker.
        import * as engine from "https://runtime.edgepython.com/js/src/engine.js";

        const base = new URL('.', import.meta.url).href;
        const out = document.getElementById("output");

        await engine.load({
            // compiler_lib.wasm is the language runtime — pulled from the official CDN, same as the JS engine above. Only edge_python_dom.wasm (the DOM capability) is served locally.
            wasmUrl: 'https://runtime.edgepython.com/js/compiler_lib.wasm',
            imports: { dom: base + 'edge_python_dom.wasm' },
            loaders: ['https://runtime.edgepython.com/js/loaders/capability-bridge.js'],
        });

        const onLine = (line) => { out.textContent += line + "\n"; };
        try {
            const src = await (await fetch("./palette.py")).text();
            const { out: diag, ms } = await engine.run({ src, onLine });
            out.textContent += `ran in ${ms.toFixed(2)} ms`;
            if (diag) out.textContent += "\n" + diag;
        } catch (e) {
            out.textContent += "[error] " + (e?.message ?? e);
            console.error(e);
        }
    </script>
</body>
</html>
