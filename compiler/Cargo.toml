[package]
name = "edge-python"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Single-pass SSA compiler based on CPython 3.13: hand-written lexer, token-to-bytecode parser, threaded-code virtual machine with NaN-boxed values, inline caching, template memoization, and a mark-sweep garbage collector. Ships as a WebAssembly module."
readme = "README.md"
autotests = false
autobins = false

[lib]
name = "compiler_lib"
crate-type = ["cdylib", "rlib"]
test = false
doctest = false

[[test]]
name = "tests"
path = "tests/main.rs"

[dependencies]
hashbrown = { version = "0.17", default-features = false }
itoa = "1"

# WASM-only global allocator. Pulled into wasm32 builds automatically; absent
# on host builds (where std's allocator is fine and `compiler.wasm` is just a
# library artifact, not the runtime target).
[target.'cfg(target_arch = "wasm32")'.dependencies]
lol_alloc = "0.4"

# Test-only deps for the JSON-driven test runner. None of these are pulled
# into the release `compiler.wasm`.
[dev-dependencies]
hashbrown = { version = "0.17", default-features = false, features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
