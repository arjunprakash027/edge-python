[package]
name = "edge-python"
version = "0.1.0"
edition = "2024"
description = "Single-pass SSA compiler based on CPython 3.13: hand-written lexer, token-to-bytecode parser, threaded-code virtual machine with NaN-boxed values, inline caching, template memoization, and a mark-sweep garbage collector. Ships as a WebAssembly module."
repository = "https://github.com/dylan-sutton-chavez/edge-python/"
license = "MIT OR Apache-2.0"
readme = "README.md"
autotests = false

[lib]
name = "compiler_lib"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[[test]]
name = "tests"
path = "tests/main.rs"

[dependencies]
hashbrown = { version = "0.17", default-features = false }
itoa = "1"
lol_alloc = { version = "0.4", optional = true }

# Test-only deps. None of these are pulled into the release `compiler.wasm`;
# they exist so CI can validate the SDK's WASM ABI end-to-end (wasmtime loads
# a `.wasm` built from `edge-sdk/examples/`, asserts the round-trip) and
# decode the JSON-driven test cases (serde + serde_json).
[dev-dependencies]
hashbrown = { version = "0.17", default-features = false, features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasmtime = { version = "27", default-features = false, features = ["cranelift", "runtime"] }

[features]
wasm = ["dep:lol_alloc"]
wasm-tests = []

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
