[package]
name = "edge-python"
version = "0.1.0"
edition = "2024"
description = "Single-pass SSA compiler based on CPython 3.13: hand-written lexer, token-to-bytecode parser, threaded-code virtual machine with NaN-boxed values, inline caching, template memoization, mark-sweep garbage collector, and configurable sandbox limits. Native and WASM targets."
repository = "https://github.com/dylan-sutton-chavez/edge-python/"
license = "MIT OR Apache-2.0"
readme = "README.md"
autotests = false

[lib]
name = "compiler_lib"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "edge"
path = "src/main.rs"

[[test]]
name = "tests"
path = "tests/main.rs"

[dependencies]
hashbrown = { version = "0.17", default-features = false }
itoa = "1"
lol_alloc = { version = "0.4", optional = true }

# Native-target-only deps. Pulled in for the `edge` CLI binary and for tests
# (both run on the host, where std + a real WASM runtime are available).
# Excluded from wasm32 builds so the demo's compiler_lib.wasm stays small and
# avoids depending on crates that don't compile to WebAssembly.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasmtime = { version = "27", default-features = false, features = ["cranelift", "runtime"] }
# HTTPS fetcher for URL-form imports. ureq 3.x uses rustls by default — no
# OpenSSL system dep needed, builds cleanly across platforms.
ureq = { version = "3", default-features = false, features = ["rustls"] }

[dev-dependencies]
hashbrown = { version = "0.17", default-features = false, features = ["serde"] }

[features]
wasm = ["dep:lol_alloc"]
wasm-tests = []

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true